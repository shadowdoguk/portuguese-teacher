name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: |
          if [ -f prisma/schema.prisma ]; then
            pnpm exec prisma generate
          else
            echo "No prisma/schema.prisma; skipping prisma generate"
          fi

      - name: Progress tracker drift check
        run: pnpm progress:check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Prisma client (if schema present)
        run: pnpm exec prisma generate
        if: hashFiles('prisma/schema.prisma') != ''

      - name: Progress tracker drift check
        run: pnpm progress:check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_MOCK: "1"

      - name: Performance budget alarm
        run: pnpm perf:budget

      - name: ASR accuracy regression suite
        run: pnpm asr:regress

      - name: SC-5 load-test (sampling distribution acceptance)
        run: pnpm sc5:load-test
